<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BTC 10-Strategy Backtester</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="/static/lightweight-charts.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">₿ <strong>BTC 10-Strategy</strong> <span class="muted">Backtester</span></div>
    <div class="top-controls">
      <label>Symbol
        <input id="symbol" value="BTCUSDT" size="9" />
      </label>
      <label>Interval
        <select id="interval">
          <option>1m</option><option>3m</option><option selected>5m</option>
          <option>15m</option><option>30m</option><option>1h</option>
          <option>4h</option><option>1d</option>
        </select>
      </label>
      <label>Mode
        <select id="mode">
          <option value="tpsl">TP / SL</option>
          <option value="polymarket">Polymarket up/down</option>
        </select>
      </label>
      <label id="oddsWrap" style="display:none">Odds
        <input id="odds" type="number" value="0.50" step="0.01" min="0.01" max="0.99" size="5" />
      </label>
      <label>Start <input id="start" type="date" /></label>
      <label>End <input id="end" type="date" /></label>
      <button id="loadBtn" class="ghost">Load chart</button>
      <button id="runBtn" class="primary">Run backtest</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="tabs" role="tablist">
        <button id="tabQuick" class="tab active" role="tab" aria-selected="true">Quick Setup</button>
        <button id="tabConfig" class="tab" role="tab" aria-selected="false">Strategy Config</button>
      </div>

      <!-- ---------- Quick Setup: strategy-agreement entry gate ---------- -->
      <div id="panelQuick" class="panel" role="tabpanel">
        <div class="pgroup">
          <h4>00 — Quick Setup</h4>
          <div class="prow">
            <label for="agreeMode" title="AND: at least N enabled strategies must agree on the same candle. OR: any single enabled strategy is enough (conflicting candles are still discarded).">Agreement Mode</label>
            <select id="agreeMode">
              <option value="AND" selected>AND</option>
              <option value="OR">OR</option>
            </select>
          </div>
          <div class="prow" id="rowMinAgree">
            <label for="minAgree" title="AND mode only. How many enabled strategies must fire on the SAME candle in the same direction.">Min Strategies In Agreement</label>
            <input id="minAgree" type="number" min="1" max="10" step="1" value="1" />
          </div>
          <div class="prow" id="rowStrict">
            <label for="strictDir" title="AND mode only. When a candle has both long and short votes: ON discards the bar as a disagreement; OFF lets the heavier side win. OR mode always discards them.">Strict same-direction only</label>
            <input id="strictDir" type="checkbox" checked />
          </div>
        </div>
        <div class="pgroup">
          <h4>Active strategies <span id="quickCount" class="muted small"></span></h4>
          <div id="quickList"></div>
        </div>
        <p id="quickHint" class="muted small"></p>
      </div>

      <!-- ---------- Strategy Config: one strategy, full parameters ------ -->
      <div id="panelConfig" class="panel" role="tabpanel" hidden>
        <div class="field">
          <label class="block">Strategy</label>
          <select id="strategy"></select>
          <p id="stratDesc" class="muted small"></p>
        </div>
        <div class="field">
          <label class="block">Preset</label>
          <select id="preset"></select>
        </div>
        <div id="params"></div>
      </div>
    </aside>

    <section class="content">
      <div id="statusBar" class="status muted">Pick a range and run a backtest.</div>

      <div id="stats" class="stats"></div>

      <div class="chart-wrap">
        <div id="chart"></div>
      </div>

      <div class="tables">
        <div class="table-head">
          <span>Trades</span>
          <span id="tradeCount" class="muted small"></span>
        </div>
        <div class="table-scroll">
          <table id="trades">
            <thead>
              <tr>
                <th>#</th><th>Side</th><th>Entry time</th><th>Entry</th>
                <th>Exit</th><th>Exit type</th><th>PnL %</th><th>Bars</th><th>Reason</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
